databases:
  - name: ts-library-app-db
    databaseName: tslibrary_db
    user: tslibrary

services:
  - type: web
    name: TrhoveSvinyWeb
    env: python
    buildCommand: python3 -m venv .venv && ./.venv/bin/pip install -r requirements.txt
    startCommand: ./.venv/bin/gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ts-library-app-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: sandbox.smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USE_TLS
        value: "1"
      - key: MAIL_USERNAME
        value: a89fb9430cc48c
      - key: MAIL_DEFAULT_SENDER
        value: TS Library <no-reply@school.local>
      - key: MAIL_TIMEOUT_SECONDS
        value: "5"
      - key: MAIL_SEND_STEP_TIMEOUT_SECONDS
        value: "6"
